# predict_tails.py config — KG expansion using trained GraphMERT (stage-1 checkpoint)
# Predicts top-k tail tokens for every (head, relation) pair found in training sentences.

model_path: DELLA_ROOT/outputs/networking_graphmert/span/rel22/bs32_lr_3e-05
tokenizer_path: BERT_TOKENIZER_PATH

preprocessed_dataset_path: DELLA_ROOT/gen4_triplets/predict_tails_input/train
relation_map_path: DELLA_ROOT/gen4_triplets/relation_map.json

output_dir: DELLA_ROOT/outputs/kg_expansion/train

top_k: 15
batch_size: 64

num_leaves: 3
root_nodes: 128

num_parallel_jobs: 1
take_subset: false
