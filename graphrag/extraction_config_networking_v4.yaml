# KG extraction config v4 — Computer Networking domain (Kurose & Ross)
#
# Changes from v2/v3:
#   REMOVED: uses (catch-all), transports (redundant), affects (too vague)
#   ADDED:   variant_of, encapsulates, susceptible_to, authenticates, encrypts
#   RESULT:  32 relations with tighter semantic boundaries and security coverage
#
# Design principle: every relation should fire roughly equally across Ch1-8.
# Disambiguation section in prompt_template prevents the model from defaulting
# to broad relations (implements, requires, provides) when a specific one fits.

# --- LLM (Tinker) ---
llm_config:
  temperature: 0.0
  max_tokens: 4096

# --- Delimiters ---
completion_delimiter: "<|COMPLETE|>"
tuple_delimiter: "<|>"
record_delimiter: "##"

# --- Entity Types ---
entity_types:
  - Protocol
  - Layer
  - Network Component
  - Algorithm
  - Concept
  - Service
  - Metric
  - Attack

entity_types_examples: |
  1. Protocol: TCP; UDP; IP; HTTP; HTTPS; FTP; SMTP; DNS; TLS; SSL; ICMP; BGP; OSPF; Ethernet; Wi-Fi; ARP; DHCP; QUIC; IPsec; SSH
  2. Layer: Application Layer; Transport Layer; Network Layer; Link Layer; Physical Layer; Data Link Layer
  3. Network Component: Router; Switch; Host; Server; Client; Gateway; Firewall; Hub; Modem; Access Point; CDN; ISP; NAT; Buffer; Queue; Certificate Authority; Base Station
  4. Algorithm: Dijkstra's Algorithm; Distance Vector; Link State; Slow Start; Congestion Avoidance; Round Robin; CSMA/CD; CSMA/CA; Leaky Bucket; Token Bucket; RSA; AES; MD5; SHA-1
  5. Concept: Throughput; Latency; Bandwidth; Packet Loss; Congestion; Delay; Jitter; RTT; Flow Control; Segment; Datagram; Frame; Packet; Socket; Port; IP Address; MAC Address; Checksum; Three-Way Handshake; ACK; SYN; Multiplexing; Forwarding Table; Routing Table; CRC; ARQ; Sliding Window; Sequence Number; Digital Signature; Certificate; Public Key; Private Key; Session Key
  6. Service: Web Service; Email Service; File Transfer; DNS Service; Streaming; VoIP; CDN Service; Peer-to-Peer; DHCP Service
  7. Metric: RTT; Throughput; Utilization; Packet Loss Rate; Bit Error Rate; Propagation Delay; Queuing Delay; Processing Delay; Transmission Delay; End-to-End Delay; Bandwidth-Delay Product
  8. Attack: SYN Flood; DDoS; DNS Spoofing; Cache Poisoning; Man-in-the-Middle; Replay Attack; Eavesdropping; IP Spoofing; Packet Sniffing

# --- Relation Types ---
relation_types:
  # Taxonomy
  - is_a
  - variant_of
  # Structural composition
  - has_part
  - part_of
  - contains
  - encapsulates
  # Functional capabilities
  - provides
  - enables
  - supports
  - requires
  # Protocol layering & implementation
  - runs_on
  - operates_at
  - implements
  # Communication & data flow
  - sends
  - receives
  - forwards
  - routes_to
  - communicates_with
  # Identification & mapping
  - identifies
  - maps_to
  - connects_to
  # Control & management
  - controls
  - manages
  - measures
  # Causality & performance
  - causes
  - increases
  - decreases
  - prevents
  - mitigates
  # Security
  - susceptible_to
  - authenticates
  - encrypts

relation_types_examples: |
  tcp, is_a, transport protocol
  tcp reno, variant_of, tcp
  router, has_part, forwarding table
  forwarding table, part_of, router
  frame, contains, payload
  ip, encapsulates, transport segment
  tcp, provides, reliable delivery
  nat, enables, address reuse
  ethernet, supports, full-duplex communication
  tls, requires, tcp
  http, runs_on, tcp
  tcp, operates_at, transport layer
  router, implements, store-and-forward
  client, sends, syn segment
  server, receives, syn segment
  router, forwards, packet
  bgp, routes_to, destination prefix
  client, communicates_with, server
  ip address, identifies, host
  dns, maps_to, ip address
  host, connects_to, access point
  congestion control, controls, transmission rate
  ospf, manages, link-state database
  rtt, measures, round-trip time
  buffer overflow, causes, packet loss
  congestion, increases, queuing delay
  flow control, decreases, send rate
  checksum, prevents, undetected errors
  slow start, mitigates, congestion
  tcp, susceptible_to, syn flood attack
  certificate authority, authenticates, server
  tls, encrypts, application data

prompt_template: |
  -Role-
  You are an AI assistant specialized in extracting structured knowledge from computer networking textbooks to build a knowledge graph.

  -Goal-
  Given a passage from a computer networking textbook, a predefined list of entity types, and a predefined list of relation types, identify all networking entities and the meaningful relationships explicitly described among them.

  -Entity Types-
  Extract entities from the following types only:
  {entity_types}

  Use the examples below ONLY to understand what each type covers:
  {entity_types_examples}

  -Relation Types-
  Use ONLY these relation types:
  {relation_types}

  One example per relation type (formatted as 'head, relation, tail'):
  {relation_types_examples}

  -Relation Disambiguation-
  Choose the most specific relation that fits. When multiple relations seem applicable, use these rules:

  Taxonomy:
  - `is_a` for type/class membership: "tcp, is_a, transport protocol"
  - `variant_of` for specific variants of the same protocol or algorithm: "tcp reno, variant_of, tcp"; "go-back-n, variant_of, arq"

  Structural composition — pick by what the text describes:
  - `has_part` when head structurally owns tail as a component: "router, has_part, forwarding table"
  - `part_of` when tail structurally owns head: "header, part_of, packet"
  - `contains` when a PDU holds tail as its data payload: "frame, contains, ip datagram"
  - `encapsulates` when a protocol wraps tail data inside its own PDU: "ip, encapsulates, transport segment"

  Protocol layering — pick by relationship type:
  - `runs_on` when head protocol operates on top of tail (a lower-layer protocol or medium): "http, runs_on, tcp"; "tcp, runs_on, ip"; "ethernet, runs_on, optical fiber"
  - `operates_at` ONLY to name which layer head belongs to: "tcp, operates_at, transport layer"
  - `implements` when head executes tail as an algorithm, mechanism, or technique: "router, implements, store-and-forward"; "ospf, implements, dijkstra's algorithm"

  Functional capabilities — pick by dependency strength:
  - `provides` when head actively offers tail as a service or guarantee: "tcp, provides, reliable delivery"
  - `enables` when head makes tail possible but does not directly perform it: "nat, enables, address reuse"
  - `supports` when head is compatible with or accommodates tail: "ethernet, supports, full-duplex communication"
  - `requires` when head cannot function without tail: "tls, requires, tcp"

  Causality — pick by effect type:
  - `causes` for discrete event causation: "buffer overflow, causes, packet loss"
  - `increases` / `decreases` for quantitative effects on metrics: "congestion, increases, queuing delay"
  - `prevents` when head stops tail entirely: "checksum, prevents, undetected errors"
  - `mitigates` when head reduces severity but does not stop tail: "slow start, mitigates, congestion"

  Security — use exclusively for security concepts:
  - `susceptible_to` when head is vulnerable to an attack or failure: "tcp, susceptible_to, syn flood attack"
  - `authenticates` when head verifies the identity of tail: "certificate authority, authenticates, server"
  - `encrypts` when head transforms tail into ciphertext: "tls, encrypts, application data"

  -Steps-
  1. Identify all entities from the text that match one of the entity types above.
     For each entity:
     - entity_name: Name of the entity, lowercase
     - entity_type: One of: Protocol, Layer, Network Component, Algorithm, Concept, Service, Metric, Attack
     - entity_description: brief description from the text
     Format: ("entity"{tuple_delimiter}<entity_name>{tuple_delimiter}<entity_type>{tuple_delimiter}<entity_description>)

  2. From the entities in step 1, identify clearly stated relationships using ONLY the predefined relation types.
     - Only extract relationships explicitly supported by the text.
     - Do not extract trivial or overly general relationships.
     For each relationship:
     - source_entity: lowercase name from step 1
     - target_entity: lowercase name from step 1
     - relationship: one relation from the predefined list
     - relationship_strength: integer 1-10
     Format: ("relationship"{tuple_delimiter}<source>{tuple_delimiter}<target>{tuple_delimiter}<relationship>{tuple_delimiter}<strength>)

  3. Output all entities and relationships as a single list separated by **{record_delimiter}**.

  4. End with {completion_delimiter}

  -Constraints-
  - Only extract from the provided text; no external knowledge.
  - Only use entity types and relation types from the predefined lists.
  - Use lowercase for all entity names.
  - Keep entity descriptions concise (one sentence).
  - Do NOT use `is_a` where `variant_of` is more precise.
  - Do NOT use `has_part`/`contains`/`encapsulates` interchangeably — follow the disambiguation rules above.
  - Do NOT use `runs_on` and `operates_at` for the same relationship.


