      ######################
      Text:
      The Transmission Control Protocol (TCP) provides reliable, in-order byte-stream delivery. TCP runs on IP at the transport layer. To establish a connection, the client sends a SYN segment; the server receives it and sends back a SYN-ACK; the client replies with an ACK, completing the three-way handshake. An IP datagram encapsulates the TCP segment. Flow control prevents a fast sender from overwhelming a slow receiver by decreasing the send rate when the receive window shrinks. Congestion in the network causes packet loss and increases queuing delay. Slow start mitigates congestion by gradually increasing the congestion window. TCP is susceptible to SYN flood attacks, where an attacker sends many SYN segments without completing the handshake.
      ######################
