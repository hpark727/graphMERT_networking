# KG extraction config v2 — Computer Networking domain (Kurose & Ross)
# Extended relation set (30 types), added Metric entity type.

# --- LLM (Tinker) ---
llm_config:
  temperature: 0.0
  max_tokens: 4096

# --- Delimiters ---
completion_delimiter: "<|COMPLETE|>"
tuple_delimiter: "<|>"
record_delimiter: "##"

# --- Entity Types ---
entity_types:
  - Protocol
  - Layer
  - Network Component
  - Algorithm
  - Concept
  - Service
  - Metric

entity_types_examples: |
  1. Protocol: TCP; UDP; IP; HTTP; HTTPS; FTP; SMTP; DNS; TLS; SSL; ICMP; BGP; OSPF; Ethernet; Wi-Fi; ARP; DHCP; QUIC
  2. Layer: Application Layer; Transport Layer; Network Layer; Link Layer; Physical Layer
  3. Network Component: Router; Switch; Host; Server; Client; Gateway; Firewall; Hub; Modem; Access Point; CDN; ISP; NAT; Buffer; Queue
  4. Algorithm: Dijkstra's Algorithm; Distance Vector; Link State; Slow Start; Congestion Avoidance; Round Robin; CSMA/CD; Leaky Bucket; Token Bucket
  5. Concept: Throughput; Latency; Bandwidth; Packet Loss; Congestion; Delay; Jitter; RTT; Flow Control; Segment; Datagram; Frame; Packet; Socket; Port; IP Address; MAC Address; Checksum; Three-Way Handshake; ACK; SYN; Multiplexing; Encapsulation; Forwarding Table; Routing Table; CRC; ARQ; Sliding Window; Sequence Number; Acknowledgment
  6. Service: Web Service; Email Service; File Transfer; DNS Service; Streaming; VoIP; CDN Service; Peer-to-Peer; DHCP Service
  7. Metric: RTT; Throughput; Utilization; Packet Loss Rate; Bit Error Rate; Propagation Delay; Queuing Delay; Processing Delay; Transmission Delay; End-to-End Delay; Bandwidth-Delay Product

# --- Relation Types ---
relation_types:
  - is_a
  - part_of
  - has_part
  - uses
  - requires
  - provides
  - supports
  - enables
  - implements
  - communicates_with
  - sends
  - receives
  - forwards
  - routes_to
  - connects_to
  - contains
  - identifies
  - maps_to
  - operates_at
  - runs_on
  - transports
  - controls
  - manages
  - measures
  - affects
  - increases
  - decreases
  - causes
  - prevents
  - mitigates

relation_types_examples: |
  tcp, is_a, transport protocol
  header, part_of, packet
  packet, has_part, header
  tcp, uses, three-way handshake
  tls, requires, tcp
  tcp, provides, reliable delivery
  ethernet, supports, full-duplex communication
  nat, enables, address reuse
  router, implements, ip forwarding
  client, communicates_with, server
  client, sends, syn segment
  server, receives, syn segment
  router, forwards, packet
  bgp, routes_to, destination prefix
  host, connects_to, access point
  frame, contains, payload
  ip address, identifies, host
  dns, maps_to, ip address
  tcp, operates_at, transport layer
  http, runs_on, tcp
  ip, transports, segment
  congestion control, controls, transmission rate
  ospf, manages, link-state database
  rtt, measures, round-trip time
  packet loss, affects, throughput
  congestion, increases, queuing delay
  flow control, decreases, send rate
  buffer overflow, causes, packet loss
  checksum, prevents, undetected errors
  slow start, mitigates, congestion

prompt_template: |
  -Role-
  You are an AI assistant specialized in extracting structured knowledge from computer networking textbooks to build a knowledge graph.

  -Goal-
  Given a passage from a computer networking textbook, a predefined list of entity types, and a predefined list of relation types, identify all networking entities and the meaningful relationships explicitly described among them.

  -Entity Types-
  Extract entities from the following types only:
  {entity_types}

  Use the examples below ONLY to understand what each type covers:
  {entity_types_examples}

  -Relation Types-
  Use ONLY these relation types:
  {relation_types}

  One example per relation type (formatted as 'head, relation, tail'):
  {relation_types_examples}

  -Steps-
  1. Identify all entities from the text that match one of the entity types above.
     For each entity:
     - entity_name: Name of the entity, lowercase
     - entity_type: One of: Protocol, Layer, Network Component, Algorithm, Concept, Service, Metric
     - entity_description: brief description from the text
     Format: ("entity"{tuple_delimiter}<entity_name>{tuple_delimiter}<entity_type>{tuple_delimiter}<entity_description>)

  2. From the entities in step 1, identify clearly stated relationships using ONLY the predefined relation types.
     - Only extract relationships explicitly supported by the text.
     - Do not extract trivial or overly general relationships.
     For each relationship:
     - source_entity: lowercase name from step 1
     - target_entity: lowercase name from step 1
     - relationship: one relation from the predefined list
     - relationship_strength: integer 1-10
     Format: ("relationship"{tuple_delimiter}<source>{tuple_delimiter}<target>{tuple_delimiter}<relationship>{tuple_delimiter}<strength>)

  3. Output all entities and relationships as a single list separated by **{record_delimiter}**.

  4. End with {completion_delimiter}

  -Constraints-
  - Only extract from the provided text; no external knowledge.
  - Only use entity types and relation types from the predefined lists.
  - Use lowercase for all entity names.
  - Keep entity descriptions concise (one sentence).


user_prompt: |
  ######################
  Text:
  {input_text}
  ######################
  Output:


examples:
  - user: |
      ######################
      Text:
      The Transmission Control Protocol (TCP) provides reliable, in-order byte-stream delivery between two applications. TCP runs on IP at the transport layer. When a client wants to establish a TCP connection with a server, it sends a SYN segment; the server receives the SYN and replies with a SYN-ACK; the client then sends an ACK to complete the three-way handshake. Flow control prevents a fast sender from overwhelming a slow receiver by decreasing the send rate when the receive window shrinks. Congestion in the network increases queuing delay and causes packet loss.
      ######################
      Output:
    assistant: |
      ("entity"{tuple_delimiter}tcp{tuple_delimiter}Protocol{tuple_delimiter}Transport-layer protocol providing reliable, in-order byte-stream delivery)
