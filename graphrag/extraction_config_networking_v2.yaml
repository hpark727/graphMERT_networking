  - user: |
      ######################
      Text:
      Routers use forwarding tables to determine the output link for each arriving packet and forward it toward its destination. The forwarding table is populated by routing algorithms. In link-state routing, each router manages a complete map of the network topology, then runs Dijkstra's algorithm to compute shortest paths. Distance-vector routing uses the Bellman-Ford equation; each router maintains a distance vector to all destinations and exchanges it with neighbors. BGP routes traffic to destination prefixes across autonomous systems. A router's buffer may overflow when arrival rates exceed its capacity, causing packet loss and increasing end-to-end delay.
      ######################
